<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOOP VIRTUAL</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="logo" onclick="location.href='/'">SOOP_VIRTUAL</div>
    <div style="display:flex; align-items:center; gap:1rem;">
    <button class="btn btn-ghost" id="openContact" style="padding:0.4rem 0.8rem; font-size:0.68rem;">문의</button>
    <div class="nav-meta">// biased.reviews</div>
  </div>
</header>

<section class="hero">
  <div class="hero-label">— Personal Archive · Est. 2026</div>
  <h1>SOOP <em>VIRTUAL</em></h1>
</section>

<div class="controls">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="이름, 태그로 검색...">
  </div>
<div class="sort-wrap" style="margin-left:auto;">
    <span class="sort-label">FILTER</span>
    <select id="catFilter">
      <option value="all">전체</option>
      <option value="데뷔정보">데뷔정보</option>
      <option value="10분 리뷰">10분 리뷰</option>
      <option value="리뷰">리뷰</option>
      <option value="근황">근황</option>
      <option value="박제">박제</option>
    </select>
  </div>
  <div class="sort-wrap">
    <span class="sort-label">SORT</span>
    <select id="sortSelect">
      <option value="newest">최신순</option>
      <option value="oldest">오래된순</option>
      <option value="name">이름순</option>
      <option value="debut_desc">데뷔 최신순</option>
      <option value="debut_asc">데뷔 오래된순</option>
    </select>
  </div>
</div>

<main class="gallery" id="gallery">
  <div class="loading">Loading archive...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase.js"></script>
<script src="/js/gallery.js"></script>
<div class="modal-overlay" id="contactModal">
  <div class="modal-box">
    <div class="modal-header">
      <span>문의하기</span>
      <button class="modal-close" id="closeContact">✕</button>
    </div>
    <input type="text" id="msgName" placeholder="닉네임 (선택)">
    <p style="font-size:0.75rem; color:var(--text-dim); margin-bottom:0.8rem; line-height:1.6;">리뷰는 정해진 주기 없이 시간 날 때 올리고 있어요. 대상 선정도 랜덤입니다.</p>
    <textarea id="msgContent" placeholder="리뷰 요청, 수정/삭제 요청, 기타 문의 등"></textarea>
    <button class="btn" id="submitMsg">SEND</button>
    <div id="msgResult" style="margin-top:0.6rem; font-family:var(--font-mono); font-size:0.78rem;"></div>
  </div>
</div>

<script>
document.getElementById('openContact').addEventListener('click', () => {
  document.getElementById('contactModal').classList.add('active');
});
document.getElementById('closeContact').addEventListener('click', () => {
  document.getElementById('contactModal').classList.remove('active');
});
document.getElementById('contactModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});
document.getElementById('submitMsg').addEventListener('click', async () => {
  const msg = document.getElementById('msgResult');
  const content = document.getElementById('msgContent').value.trim();
  if (!content) { msg.textContent = '내용을 입력해주세요.'; msg.style.color = 'var(--accent)'; return; }
  const name = document.getElementById('msgName').value.trim() || '익명';
  let fp = localStorage.getItem('visitor_fp');
  if (!fp) { fp = crypto.randomUUID(); localStorage.setItem('visitor_fp', fp); }
  const { error } = await db.from('messages').insert({
    name: name, content: content, vtuber_slug: null, visitor_fingerprint: fp
  });
  if (error) { msg.textContent = '전송 실패'; msg.style.color = 'var(--accent)'; }
  else {
    msg.textContent = '메시지가 전송되었습니다.'; msg.style.color = 'var(--accent-2)';
    document.getElementById('msgContent').value = '';
    document.getElementById('msgName').value = '';
  }
});
</script>
</body>
</html>
